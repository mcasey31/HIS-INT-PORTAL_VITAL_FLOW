name: 🎯 Deploy QA (HIS + Portal)

on:
  push:
    branches:
      - qa

env:
  REGISTRY: ghcr.io
  HIS_BACKEND_IMAGE: ghcr.io/mcasey31/his-int-portal_vital_flow/his-backend
  HIS_FRONTEND_IMAGE: ghcr.io/mcasey31/his-int-portal_vital_flow/his-frontend
  PORTAL_BACKEND_IMAGE: ghcr.io/mcasey31/his-int-portal_vital_flow/portal-backend

jobs:
  build-and-push:
    name: 🔨 Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # HIS Backend
      - name: 📦 Build & Push HIS Backend
        uses: docker/build-push-action@v5
        with:
          context: ./VitalFlowHis/back/src/VitalFlow.His.Api
          file: ./VitalFlowHis/back/src/VitalFlow.His.Api/Dockerfile
          push: true
          tags: |
            ${{ env.HIS_BACKEND_IMAGE }}:qa
            ${{ env.HIS_BACKEND_IMAGE }}:qa-${{ github.sha }}

      # HIS Frontend
      - name: 📦 Build & Push HIS Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./VitalFlowHis/front
          file: ./VitalFlowHis/front/Dockerfile
          push: true
          tags: |
            ${{ env.HIS_FRONTEND_IMAGE }}:qa
            ${{ env.HIS_FRONTEND_IMAGE }}:qa-${{ github.sha }}

      # Portal Backend
      - name: 📦 Build & Push Portal Backend
        uses: docker/build-push-action@v5
        with:
          context: ./VitalFlowPortal
          file: ./VitalFlowPortal/Dockerfile.backend
          push: true
          tags: |
            ${{ env.PORTAL_BACKEND_IMAGE }}:qa
            ${{ env.PORTAL_BACKEND_IMAGE }}:qa-${{ github.sha }}

  # 💡 MVP Strategy: Docker only for QA (no Vercel)
  # Team uses local Docker Compose to see changes
  # Vercel deploy only on main branch for production

  # Railway deployment commented out - configure when RAILWAY_PROJECT_ID is added to secrets
  #   name: 🚂 Deploy to Railway QA
  #   needs: build-and-push
  #   runs-on: ubuntu-latest
  #   environment: qa
  #
  #   steps:
  #     - name: 📥 Checkout code
  #       uses: actions/checkout@v4
  #
  #     - name: 🚂 Deploy HIS Backend to Railway
  #       uses: perovskii/railway-action@v1
  #       with:
  #         projectId: ${{ secrets.RAILWAY_PROJECT_ID }}
  #         environmentName: qa
  #         serviceId: ${{ secrets.RAILWAY_HIS_BACKEND_SERVICE_ID_QA }}
  #         redeployWithoutChanges: true
  #       env:
  #         RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  #
  #     - name: 🚂 Deploy Portal Backend to Railway
  #       uses: perovskii/railway-action@v1
  #       with:
  #         projectId: ${{ secrets.RAILWAY_PROJECT_ID }}
  #         environmentName: qa
  #         serviceId: ${{ secrets.RAILWAY_PORTAL_BACKEND_SERVICE_ID_QA }}
  #         redeployWithoutChanges: true
  #       env:
  #         RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  notify:
    name: 📢 Notify Deployment
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: ✅ Deployment Success
        if: success()
        run: |
          echo "✅ QA Environment Pipeline Completed Successfully!"
          echo ""
          echo "🐳 Docker Images Built & Pushed to GHCR:"
          echo "  - HIS Backend: ghcr.io/mcasey31/his-int-portal_vital_flow/his-backend:qa"
          echo "  - HIS Frontend: ghcr.io/mcasey31/his-int-portal_vital_flow/his-frontend:qa"
          echo "  - Portal Backend: ghcr.io/mcasey31/his-int-portal_vital_flow/portal-backend:qa"
          echo ""
          echo "🌐 Vercel QA Frontends (Auto-deployed via GitHub integration):"
          echo "  - Check Vercel QA projects for deployment status"
          echo ""
          echo "⏳ Vercel builds typically complete within 2-5 minutes"
          echo "  - HIS Frontend: https://vitalflow-his-front-qa.vercel.app"
          echo "  - Portal Frontend: https://vitalflow-qa.vercel.app"

      - name: ❌ Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment Failed! Check GitHub Actions logs."
          exit 1
