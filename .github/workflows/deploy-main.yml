name: 🌟 Deploy MAIN/Production (HIS + Portal)

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  HIS_BACKEND_IMAGE: ghcr.io/mcasey31/his-int-portal_vital_flow/his-backend
  HIS_FRONTEND_IMAGE: ghcr.io/mcasey31/his-int-portal_vital_flow/his-frontend
  PORTAL_BACKEND_IMAGE: ghcr.io/mcasey31/his-int-portal_vital_flow/portal-backend

jobs:
  build-and-push:
    name: 🔨 Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # HIS Backend
      - name: 📦 Build & Push HIS Backend
        uses: docker/build-push-action@v5
        with:
          context: ./VitalFlowHis/back/src/VitalFlow.His.Api
          file: ./VitalFlowHis/back/src/VitalFlow.His.Api/Dockerfile
          push: true
          tags: |
            ${{ env.HIS_BACKEND_IMAGE }}:main
            ${{ env.HIS_BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.HIS_BACKEND_IMAGE }}:latest

      # HIS Frontend
      - name: 📦 Build & Push HIS Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./VitalFlowHis/front
          file: ./VitalFlowHis/front/Dockerfile
          push: true
          tags: |
            ${{ env.HIS_FRONTEND_IMAGE }}:main
            ${{ env.HIS_FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.HIS_FRONTEND_IMAGE }}:latest

      # Portal Backend
      - name: 📦 Build & Push Portal Backend
        uses: docker/build-push-action@v5
        with:
          context: ./VitalFlowPortal
          file: ./VitalFlowPortal/Dockerfile.backend
          push: true
          tags: |
            ${{ env.PORTAL_BACKEND_IMAGE }}:main
            ${{ env.PORTAL_BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.PORTAL_BACKEND_IMAGE }}:latest

  deploy-vercel-main:
    name: 🌐 Deploy to Vercel PRODUCTION
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Debug: Check Vercel Secrets
        run: |
          echo "VERCEL_TOKEN is set: $([ -n '${{ secrets.VERCEL_TOKEN }}' ] && echo 'yes' || echo 'no')"
          echo "VERCEL_ORG_ID is set: $([ -n '${{ secrets.VERCEL_ORG_ID }}' ] && echo 'yes' || echo 'no')"
          echo "VERCEL_HIS_FRONTEND_MAIN_PROJECT_ID is set: $([ -n '${{ secrets.VERCEL_HIS_FRONTEND_MAIN_PROJECT_ID }}' ] && echo 'yes' || echo 'no')"
          echo "VERCEL_PORTAL_FRONTEND_MAIN_PROJECT_ID is set: $([ -n '${{ secrets.VERCEL_PORTAL_FRONTEND_MAIN_PROJECT_ID }}' ] && echo 'yes' || echo 'no')"

      - name: 🌐 Deploy HIS Frontend to Vercel
        run: |
          npm install -g vercel
          cd ./VitalFlowHis/front
          vercel deploy --prod --yes --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_HIS_FRONTEND_MAIN_PROJECT_ID }}

      - name: 🌐 Deploy Portal Frontend to Vercel
        continue-on-error: true
        run: |
          npm install -g vercel
          cd ./VitalFlowPortal
          vercel deploy --prod --yes --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PORTAL_FRONTEND_MAIN_PROJECT_ID }}

  # Railway deployment commented out - configure when RAILWAY_PROJECT_ID is added to secrets
  # deploy-railway-main:
  #   name: 🚂 Deploy to Railway MAIN
  #   needs: build-and-push
  #   runs-on: ubuntu-latest
  #   environment: production
  #
  #   steps:
  #     - name: 📥 Checkout code
  #       uses: actions/checkout@v4
  #
  #     - name: 🚂 Deploy HIS Backend to Railway
  #       uses: perovskii/railway-action@v1
  #       with:
  #         projectId: ${{ secrets.RAILWAY_PROJECT_ID }}
  #         environmentName: production
  #         serviceId: ${{ secrets.RAILWAY_HIS_BACKEND_SERVICE_ID_PROD }}
  #         redeployWithoutChanges: true
  #       env:
  #         RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  #
  #     - name: 🚂 Deploy Portal Backend to Railway
  #       uses: perovskii/railway-action@v1
  #       with:
  #         projectId: ${{ secrets.RAILWAY_PROJECT_ID }}
  #         environmentName: production
  #         serviceId: ${{ secrets.RAILWAY_PORTAL_BACKEND_SERVICE_ID_PROD }}
  #         redeployWithoutChanges: true
  #       env:
  #         RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  notify:
    name: 📢 Notify Deployment
    needs: [build-and-push, deploy-vercel-main]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: ✅ Production Deployment Success
        if: success()
        run: |
          echo "✅ PRODUCTION Environment Pipeline Completed Successfully!"
          echo ""
          echo "⚠️  PRODUCTION DEPLOYMENT"
          echo ""
          echo "🐳 Docker Images Built & Pushed to GHCR:"
          echo "  - HIS Backend: ghcr.io/mcasey31/his-int-portal_vital_flow/his-backend:latest"
          echo "  - HIS Frontend: ghcr.io/mcasey31/his-int-portal_vital_flow/his-frontend:latest"
          echo "  - Portal Backend: ghcr.io/mcasey31/his-int-portal_vital_flow/portal-backend:latest"
          echo ""
          echo "🌐 Vercel Production Frontends (Auto-deployed via GitHub integration):"
          echo "  - Check Vercel Production projects for deployment status"
          echo ""
          echo "⏳ Vercel builds typically complete within 2-5 minutes"
          echo "  - HIS Frontend: https://vitalflow-his-front.vercel.app"
          echo "  - Portal Frontend: https://vitalflow-portal.vercel.app"
          echo ""
          echo "⏰ Timestamp: $(date)"

      - name: ❌ Production Deployment Failed
        if: failure()
        run: |
          echo "❌ PRODUCTION Deployment Failed! Check GitHub Actions logs immediately."
          exit 1
