name: 🚀 Deploy DEV (HIS + Portal)

on:
  push:
    branches:
      - dev

env:
  REGISTRY: ghcr.io
  HIS_BACKEND_IMAGE: ghcr.io/mcasey31/his-int-portal_vital_flow/his-backend
  HIS_FRONTEND_IMAGE: ghcr.io/mcasey31/his-int-portal_vital_flow/his-frontend
  PORTAL_BACKEND_IMAGE: ghcr.io/mcasey31/his-int-portal_vital_flow/portal-backend

jobs:
  build-and-push:
    name: 🔨 Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # HIS Backend
      - name: 📦 Build & Push HIS Backend
        uses: docker/build-push-action@v5
        with:
          context: ./VitalFlowHis/back/src/VitalFlow.His.Api
          file: ./VitalFlowHis/back/src/VitalFlow.His.Api/Dockerfile
          push: true
          tags: |
            ${{ env.HIS_BACKEND_IMAGE }}:dev
            ${{ env.HIS_BACKEND_IMAGE }}:dev-${{ github.sha }}
            ${{ env.HIS_BACKEND_IMAGE }}:latest

      # HIS Frontend
      - name: 📦 Build & Push HIS Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./VitalFlowHis/front
          file: ./VitalFlowHis/front/Dockerfile
          push: true
          tags: |
            ${{ env.HIS_FRONTEND_IMAGE }}:dev
            ${{ env.HIS_FRONTEND_IMAGE }}:dev-${{ github.sha }}
            ${{ env.HIS_FRONTEND_IMAGE }}:latest

      # Portal Backend
      - name: 📦 Build & Push Portal Backend
        uses: docker/build-push-action@v5
        with:
          context: ./VitalFlowPortal
          file: ./VitalFlowPortal/Dockerfile.backend
          push: true
          tags: |
            ${{ env.PORTAL_BACKEND_IMAGE }}:dev
            ${{ env.PORTAL_BACKEND_IMAGE }}:dev-${{ github.sha }}
            ${{ env.PORTAL_BACKEND_IMAGE }}:latest

  deploy-vercel-dev:
    name: 🌐 Deploy to Vercel DEV
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🌐 Deploy HIS Frontend to Vercel
        run: |
          cd ./VitalFlowHis/front
          npm install -g vercel
          vercel deploy --prod --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_HIS_FRONTEND_PROJECT_ID }}

      - name: 🌐 Deploy Portal Frontend to Vercel
        run: |
          cd ./VitalFlowPortal
          npm install -g vercel
          vercel deploy --prod --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PORTAL_FRONTEND_PROJECT_ID }}


  # Railway deployment commented out - configure when RAILWAY_PROJECT_ID is added to secrets
  # deploy-railway-dev:
  #   name: 🚂 Deploy to Railway DEV
  #   needs: build-and-push
  #   runs-on: ubuntu-latest
  #   environment: development
  #
  #   steps:
  #     - name: 📥 Checkout code
  #       uses: actions/checkout@v4
  #
  #     - name: 🚂 Deploy HIS Backend to Railway
  #       uses: perovskii/railway-action@v1
  #       with:
  #         projectId: ${{ secrets.RAILWAY_PROJECT_ID }}
  #         environmentName: development
  #         serviceId: ${{ secrets.RAILWAY_HIS_BACKEND_SERVICE_ID_DEV }}
  #         redeployWithoutChanges: true
  #       env:
  #         RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  #
  #     - name: 🚂 Deploy Portal Backend to Railway
  #       uses: perovskii/railway-action@v1
  #       with:
  #         projectId: ${{ secrets.RAILWAY_PROJECT_ID }}
  #         environmentName: development
  #         serviceId: ${{ secrets.RAILWAY_PORTAL_BACKEND_SERVICE_ID_DEV }}
  #         redeployWithoutChanges: true
  #       env:
  #         RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  notify:
    name: 📢 Notify Deployment
    needs: [deploy-vercel-dev]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: ✅ Deployment Success
        if: success()
        run: |
          echo "✅ DEV Environment Deployed Successfully!"
          echo ""
          echo "🐳 Docker Images:"
          echo "  - HIS Backend: ghcr.io/mcasey31/his-int-portal_vital_flow/his-backend:dev"
          echo "  - HIS Frontend: ghcr.io/mcasey31/his-int-portal_vital_flow/his-frontend:dev"
          echo "  - Portal Backend: ghcr.io/mcasey31/his-int-portal_vital_flow/portal-backend:dev"
          echo ""
          echo "🌐 Vercel Deployments:"
          echo "  - HIS Frontend: https://vitalflow-his-front-dev.vercel.app"
          echo "  - Portal Frontend: https://vitalflow-dev.vercel.app"

      - name: ❌ Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment Failed! Check GitHub Actions logs."
          exit 1
