name: 🚀 Deploy DEV (HIS + Portal)
# Test deployment workflow - MARTO automation test

on:
  push:
    branches:
      - dev

env:
  REGISTRY: ghcr.io
  HIS_BACKEND_IMAGE: ghcr.io/mcasey31/his-int-portal_vital_flow/his-backend
  HIS_FRONTEND_IMAGE: ghcr.io/mcasey31/his-int-portal_vital_flow/his-frontend
  PORTAL_BACKEND_IMAGE: ghcr.io/mcasey31/his-int-portal_vital_flow/portal-backend

jobs:
  build-and-push:
    name: 🔨 Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # HIS Backend
      - name: 📦 Build & Push HIS Backend
        uses: docker/build-push-action@v5
        with:
          context: ./back/src/VitalFlow.His.Api
          file: ./back/src/VitalFlow.His.Api/Dockerfile
          push: true
          tags: |
            ${{ env.HIS_BACKEND_IMAGE }}:dev
            ${{ env.HIS_BACKEND_IMAGE }}:dev-${{ github.sha }}
            ${{ env.HIS_BACKEND_IMAGE }}:latest

      # HIS Frontend
      - name: 📦 Build & Push HIS Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front
          file: ./front/Dockerfile
          push: true
          tags: |
            ${{ env.HIS_FRONTEND_IMAGE }}:dev
            ${{ env.HIS_FRONTEND_IMAGE }}:dev-${{ github.sha }}
            ${{ env.HIS_FRONTEND_IMAGE }}:latest

      # Portal Backend
      - name: 📦 Build & Push Portal Backend
        uses: docker/build-push-action@v5
        with:
          context: ./VitalFlowPortal
          file: ./VitalFlowPortal/Dockerfile.backend
          push: true
          tags: |
            ${{ env.PORTAL_BACKEND_IMAGE }}:dev
            ${{ env.PORTAL_BACKEND_IMAGE }}:dev-${{ github.sha }}
            ${{ env.PORTAL_BACKEND_IMAGE }}:latest

  # 💡 MVP Strategy: Docker only for dev (no Vercel)
  # Team uses local Docker Compose to see changes
  # Vercel deploy only on main branch for production

  # Railway deployment commented out - configure when RAILWAY_PROJECT_ID is added to secrets
  # deploy-railway-dev:
  #   name: 🚂 Deploy to Railway DEV
  #   needs: build-and-push
  #   runs-on: ubuntu-latest
  #   environment: development
  #
  #   steps:
  #     - name: 📥 Checkout code
  #       uses: actions/checkout@v4
  #
  #     - name: 🚂 Deploy HIS Backend to Railway
  #       uses: perovskii/railway-action@v1
  #       with:
  #         projectId: ${{ secrets.RAILWAY_PROJECT_ID }}
  #         environmentName: development
  #         serviceId: ${{ secrets.RAILWAY_HIS_BACKEND_SERVICE_ID_DEV }}
  #         redeployWithoutChanges: true
  #       env:
  #         RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  #
  #     - name: 🚂 Deploy Portal Backend to Railway
  #       uses: perovskii/railway-action@v1
  #       with:
  #         projectId: ${{ secrets.RAILWAY_PROJECT_ID }}
  #         environmentName: development
  #         serviceId: ${{ secrets.RAILWAY_PORTAL_BACKEND_SERVICE_ID_DEV }}
  #         redeployWithoutChanges: true
  #       env:
  #         RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  notify:
    name: 📢 Notify Deployment
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: ✅ Deployment Success
        if: success()
        run: |
          echo "✅ DEV Environment Docker Build Completed!"
          echo ""
          echo "🐳 Docker Images Built & Pushed to GHCR:"
          echo "  - HIS Backend: ghcr.io/mcasey31/his-int-portal_vital_flow/his-backend:dev"
          echo "  - HIS Frontend: ghcr.io/mcasey31/his-int-portal_vital_flow/his-frontend:dev"
          echo "  - Portal Backend: ghcr.io/mcasey31/his-int-portal_vital_flow/portal-backend:dev"
          echo ""
          echo "📋 Next Steps:"
          echo "  1. Pull latest images: docker pull ghcr.io/mcasey31/his-int-portal_vital_flow/*:dev"
          echo "  2. Run Docker Compose: docker-compose up -d"
          echo "  3. All team members see same changes"
          echo ""
          echo "🎯 MVP: Team uses local Docker to see changes"

      - name: ❌ Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment Failed! Check GitHub Actions logs."
          exit 1
