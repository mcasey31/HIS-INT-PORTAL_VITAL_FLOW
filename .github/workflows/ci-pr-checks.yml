name: PR Validation

on:
  pull_request:
    branches:
      - dev
      - qa
      - develop
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  db-schema-contract:
    name: DB Schema Contract
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: vitalflow_his
          POSTGRES_USER: vitalflow_user
          POSTGRES_PASSWORD: secure_password_change_me
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vitalflow_user -d vitalflow_his"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply base init
        env:
          PGPASSWORD: secure_password_change_me
        run: psql -h localhost -U vitalflow_user -d vitalflow_his -v ON_ERROR_STOP=1 -f scripts/init-db.sql

      - name: Apply canonical migrations
        env:
          PGPASSWORD: secure_password_change_me
        run: |
          for file in db/migrations/*.sql; do
            echo "Applying $file"
            psql -h localhost -U vitalflow_user -d vitalflow_his -v ON_ERROR_STOP=1 -f "$file"
          done

      - name: Validate schema contract
        env:
          PGPASSWORD: secure_password_change_me
        run: psql -h localhost -U vitalflow_user -d vitalflow_his -v ON_ERROR_STOP=1 -f db/scripts/assert_schema_contract.sql

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        working-directory: front
        run: npm ci

      - name: Build frontend
        working-directory: front
        run: npm run build

  backend-build-test:
    name: Backend Build and Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore backend API
        run: dotnet restore back/src/VitalFlow.His.Api/VitalFlow.His.Api.csproj

      - name: Build backend API
        run: dotnet build back/src/VitalFlow.His.Api/VitalFlow.His.Api.csproj --configuration Release --no-restore

      - name: Restore backend tests
        run: dotnet restore back/tests/VitalFlow.His.Api.Tests/VitalFlow.His.Api.Tests.csproj

      - name: Run backend tests
        run: dotnet test back/tests/VitalFlow.His.Api.Tests/VitalFlow.His.Api.Tests.csproj --configuration Release --no-restore --verbosity normal
