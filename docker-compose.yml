services:
  # ============================================
  # PostgreSQL - Base de datos compartida
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: vitalflow_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vitalflow_his}
      POSTGRES_USER: ${POSTGRES_USER:-vitalflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_POSTGRES_PASSWORD}
      PGTZ: ${PGTZ:-America/Argentina/Buenos_Aires}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vitalflow_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vitalflow_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "com.example.description=VitalFlow PostgreSQL Database"

  # ============================================
  # Redis - Cache de agendas/slots
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: vitalflow_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-CHANGE_ME_REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6389}:6379"
    volumes:
      - redis_data:/data
    networks:
      - vitalflow_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "com.example.description=VitalFlow Redis Cache"

  # ============================================
  # HIS Backend - Fachada FHIR (.NET)
  # ============================================
  his_backend:
    build:
      context: ./VitalFlowHis/back/src/VitalFlow.His.Api
      dockerfile: Dockerfile
    container_name: vitalflow_his_backend
    environment:
      ASPNETCORE_ENVIRONMENT: ${NODE_ENV:-development}
      ConnectionStrings__VitalFlowHisDb: Host=postgres;Port=5432;Database=${POSTGRES_DB:-vitalflow_his};Username=${POSTGRES_USER:-vitalflow_user};Password=${POSTGRES_PASSWORD:-CHANGE_ME_POSTGRES_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD:-CHANGE_ME_REDIS_PASSWORD}@redis:6379
      Jwt__Issuer: ${JWT_ISSUER:-https://his.vitalflow.local}
      Jwt__SigningKey: ${JWT_SECRET_KEY:-CHANGE_ME_JWT_SECRET_KEY_32_CHARS}
      Jwt__Audience: ${JWT_AUDIENCE:-portal-vitalflow}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      API_PREFIX: /api
    ports:
      - "${HIS_PORT:-3001}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vitalflow_network
    healthcheck:
      test:
        [
          "CMD",
          "dotnet",
          "--version"
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    labels:
      - "com.example.description=VitalFlow HIS Backend - FHIR R4 Facade"

  # ============================================
  # Portal Backend - Next.js API Routes
  # ============================================
  portal_backend:
    image: node:20-alpine
    container_name: vitalflow_portal_backend
    working_dir: /app
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORTAL_PORT:-3010}
      NEXT_PUBLIC_API_URL: http://localhost:3010/api
      NEXT_PUBLIC_HIS_API_URL: ${NEXT_PUBLIC_HIS_API_URL:-http://localhost:5000/api}
      HIS_API_BASE_URL: ${HIS_API_BASE_URL:-http://host.docker.internal:5000/api}
      HIS_API_USERNAME: ${HIS_API_USERNAME:-CHANGE_ME_API_USER}
      HIS_API_PASSWORD: ${HIS_API_PASSWORD:-CHANGE_ME_API_PASS}
      DATABASE_URL: postgresql://${POSTGRES_USER:-vitalflow_user}:${POSTGRES_PASSWORD:-CHANGE_ME_POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vitalflow_portal}
      REDIS_URL: redis://:${REDIS_PASSWORD:-CHANGE_ME_REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_PORTAL_JWT_SECRET}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-CHANGE_ME_NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3010}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      SKIP_ENV_VALIDATION: "1"
    ports:
      - "${PORTAL_PORT:-3010}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      his_backend:
        condition: service_started
    volumes:
      - ./VitalFlowPortal:/app
      - portal_node_modules:/app/node_modules
      - portal_next_cache:/app/.next
    command: >
      sh -c "
      if [ ! -d /app/node_modules/.bin ]; then
        npm install --ignore-scripts --no-audit --no-fund --loglevel=error && npx prisma generate;
      fi;
      npm run dev -- -H 0.0.0.0 -p 3000
      "
    networks:
      - vitalflow_network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 240s
    restart: unless-stopped
    labels:
      - "com.example.description=VitalFlow Portal - Patient Facing PWA"

  # ============================================
  # Nginx - Reverse Proxy & Load Balancer
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: vitalflow_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - his_backend
      - portal_backend
    networks:
      - vitalflow_network
    restart: unless-stopped
    labels:
      - "com.example.description=VitalFlow Nginx Reverse Proxy"

  # ============================================
  # Optional: pgAdmin - Database UI
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vitalflow_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@vitalflow.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-pgadmin_change_me}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres
    networks:
      - vitalflow_network
    restart: unless-stopped
    profiles:
      - debug
    labels:
      - "com.example.description=VitalFlow pgAdmin Database UI"

  # ============================================
  # Optional: Redis Commander - Redis UI
  # ============================================
  redis_commander:
    image: rediscommander/redis-commander:latest
    container_name: vitalflow_redis_commander
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-CHANGE_ME_REDIS_PASSWORD}
    ports:
      - "${REDIS_COMMANDER_PORT:-8081}:8081"
    depends_on:
      - redis
    networks:
      - vitalflow_network
    restart: unless-stopped
    profiles:
      - debug
    labels:
      - "com.example.description=VitalFlow Redis Commander UI"

networks:
  vitalflow_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  portal_node_modules:
    driver: local
  portal_next_cache:
    driver: local
