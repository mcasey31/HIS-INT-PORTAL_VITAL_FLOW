name: PR Validation

on:
  pull_request:
    branches:
      - develop
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        working-directory: front
        run: npm ci

      - name: Build frontend
        working-directory: front
        run: npm run build

  backend-build-test:
    name: Backend Build and Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore backend API
        run: dotnet restore back/src/VitalFlow.His.Api/VitalFlow.His.Api.csproj

      - name: Build backend API
        run: dotnet build back/src/VitalFlow.His.Api/VitalFlow.His.Api.csproj --configuration Release --no-restore

      - name: Restore backend tests
        run: dotnet restore back/tests/VitalFlow.His.Api.Tests/VitalFlow.His.Api.Tests.csproj

      - name: Run backend tests
        run: dotnet test back/tests/VitalFlow.His.Api.Tests/VitalFlow.His.Api.Tests.csproj --configuration Release --no-restore --verbosity normal
