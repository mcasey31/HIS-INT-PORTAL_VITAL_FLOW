openapi: 3.0.3
info:
  title: VitalFlow HIS - FHIR R4 Integration API
  description: |
    API REST FHIR R4 para integración bidireccional Portal Pacientes <-> HIS.
    Scope MVP: Agendas, Turnos (Appointments) y Centros (Locations).
    
    **Framework:** HL7 FHIR Release 4 (R4)
    **Autenticación:** OAuth2 client_credentials with JWT Bearer tokens
    **Security:** Scopes + Idempotency-Key + Correlation-Id
  version: 1.0.0
  contact:
    name: VitalFlow Integration Team
    url: https://vitalflow.com.ar
    email: integration@vitalflow.com.ar
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: https://his.vitalflow.com.ar/api
    description: Production HIS FHIR Facade
    variables:
      version:
        default: v1
  - url: https://his-staging.vitalflow.com.ar/api
    description: Staging environment
  - url: http://localhost:3000/api
    description: Local development

paths:
  /fhir/R4/Schedule:
    get:
      summary: Search Schedules (Agendas)
      description: |
        Busca agendas filtradas por especialidad, centro, fecha, etc.
        Retorna solo agendas activas (visible_contact_center=true).
      operationId: searchSchedules
      tags:
        - Schedule
      parameters:
        - name: actor
          in: query
          description: |
            Referencia a PractitionerRole o Practitioner
            Ejemplo: PractitionerRole/rol-003
          schema:
            type: string
            example: "PractitionerRole/rol-003"
        - name: service-type
          in: query
          description: |
            Código de servicio/especialidad (SNOMED CT)
            Ejemplo: 261662002 (Cardiology)
          schema:
            type: string
            example: "261662002"
        - name: date
          in: query
          description: |
            Fecha o rango de fechas.
            Formatos: ge2026-06-10&date=le2026-06-20
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
              format: date
            example:
              - "ge2026-06-10"
              - "le2026-06-20"
        - name: location
          in: query
          description: |
            Referencia a Location (Centro/Sede)
            Ejemplo: Location/centro-central
          schema:
            type: string
            example: "Location/centro-central"
        - name: active
          in: query
          description: Filtrar por estado activo (default true)
          schema:
            type: boolean
            default: true
        - name: _count
          in: query
          description: Elementos por página (min 1, max 100, default 20)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: _page
          in: query
          description: Número de página (default 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: Correlation-Id
          in: header
          description: UUID para trazabilidad de request
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth:
            - fhir.schedule.read
      responses:
        "200":
          description: Bundle de Schedules encontrados
          content:
            application/fhir+json:
              schema:
                $ref: "#/components/schemas/BundleSchedule"
              example:
                resourceType: Bundle
                type: searchset
                total: 2
                link:
                  - relation: self
                    url: /fhir/R4/Schedule?service-type=261662002&_page=1
                entry:
                  - fullUrl: /fhir/R4/Schedule/agenda-001
                    resource:
                      resourceType: Schedule
                      id: agenda-001
                      identifier:
                        - system: "https://his.vitalflow.com.ar/identifier/agenda"
                          value: "AGENDA-CARDIO-2026-06"
                      active: true
                      serviceType:
                        - coding:
                            - system: "http://snomed.info/sct"
                              code: "261662002"
                              display: "Cardiology"
                      actor:
                        - reference: "PractitionerRole/rol-003"
                          display: "Dr. Juan Pérez"
                        - reference: "Location/centro-central"
                          display: "Centro Ambulatorio Central"
                      planningHorizon:
                        start: "2026-06-10T00:00:00-03:00"
                        end: "2026-06-30T23:59:59-03:00"
        "401":
          description: Token inválido o expirado
          content:
            application/fhir+json:
              schema:
                $ref: "#/components/schemas/OperationOutcome"
              example:
                resourceType: OperationOutcome
                issue:
                  - severity: error
                    code: forbidden
                    diagnostics: "JWT token is expired or invalid"
        "403":
          description: Scope insuficiente
          content:
            application/fhir+json:
              schema:
                $ref: "#/components/schemas/OperationOutcome"
        "500":
          description: Error interno del servidor
          content:
            application/fhir+json:
              schema:
                $ref: "#/components/schemas/OperationOutcome"

  /fhir/R4/Slot:
    get:
      summary: Search Slots (Cupos disponibles)
      description: |
        Busca slots disponibles (status=free) de una agenda.
        Requiere parámetro 'schedule' obligatorio.
      operationId: searchSlots
      tags:
        - Slot
      parameters:
        - name: schedule
          in: query
          description: Referencia a Schedule requerida (Schedule/{id})
          required: true
          schema:
            type: string
            example: "Schedule/agenda-001"
        - name: status
          in: query
          description: Estado del slot (free, busy, busy-unavailable)
          schema:
            type: string
            enum:
              - free
              - busy
              - busy-unavailable
            default: free
        - name: start
          in: query
          description: |
            Rango de fecha-hora inicio.
            Ejemplo: ge2026-06-10T08:00:00&start=lt2026-06-10T18:00:00
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
              format: date-time
        - name: _count
          in: query
          description: Elementos por página (default 20, max 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: Correlation-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth:
            - fhir.slot.read
      responses:
        "200":
          description: Bundle de Slots encontrados
          content:
            application/fhir+json:
              schema:
                $ref: "#/components/schemas/BundleSlot"
              example:
                resourceType: Bundle
                type: searchset
                total: 8
                entry:
                  - fullUrl: /fhir/R4/Slot/slot-001
                    resource:
                      resourceType: Slot
                      id: slot-001
                      identifier:
                        - system: "https://his.vitalflow.com.ar/identifier/slot"
                          value: "SLOT-AGENDA001-20260610-0800"
                      schedule:
                        reference: "Schedule/agenda-001"
                        display: "Agenda Cardiología Dr. Pérez"
                      status: free
                      start: "2026-06-10T08:00:00-03:00"
                      end: "2026-06-10T08:30:00-03:00"
                      overbooked: false
                      extension:
                        - url: "https://his.vitalflow.com.ar/extension/capacity"
                          valueInteger: 1
                        - url: "https://his.vitalflow.com.ar/extension/location"
                          valueReference:
                            reference: "Location/lugar-atencion-001"
                            display: "Consultorio 3"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Schedule no encontrado
          content:
            application/fhir+json:
              schema:
                $ref: "#/components/schemas/OperationOutcome"

  /fhir/R4/Appointment:
    post:
      summary: Create Appointment (Reservar turno)
      description: |
        Crea un nuevo turno (Appointment) en el HIS.
        Requiere Idempotency-Key para prevenir duplicación en reintentos.
        Valida disponibilidad de slot en forma atómica.
      operationId: createAppointment
      tags:
        - Appointment
      parameters:
        - name: Correlation-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: Clave única para deduplicación de reintentos
      requestBody:
        required: true
        content:
          application/fhir+json:
            schema:
              $ref: "#/components/schemas/Appointment"
            example:
              resourceType: Appointment
              identifier:
                - system: "https://portal.vitalflow.com.ar/identifier/appointment-external"
                  value: "PORTAL-APT-2026-001234"
              status: booked
              participant:
                - actor:
                    reference: "Patient/paciente-001"
                    display: "Juan Doe"
                  required: required
                  status: accepted
                - actor:
                    reference: "PractitionerRole/rol-003"
                    display: "Dr. Juan Pérez"
                  required: required
                  status: accepted
                - actor:
                    reference: "Location/centro-central"
                  required: required
                  status: accepted
              slot:
                - reference: "Slot/slot-001"
              created: "2026-06-10T14:30:00-03:00"
              start: "2026-06-10T08:00:00-03:00"
              end: "2026-06-10T08:30:00-03:00"
              reason:
                - text: "Control de tension arterial"
              extension:
                - url: "https://his.vitalflow.com.ar/extension/bookedFrom"
                  valueString: "portal"
      security:
        - bearerAuth:
            - fhir.appointment.write
      responses:
        "201":
          description: Appointment creado exitosamente
          headers:
            Location:
              description: URL del recurso creado
              schema:
                type: string
                example: "/fhir/R4/Appointment/apt-his-99887"
          content:
            application/fhir+json:
              schema:
                $ref: "#/components/schemas/Appointment"
              example:
                resourceType: Appointment
                id: apt-his-99887
                identifier:
                  - system: "https://his.vitalflow.com.ar/identifier/appointment"
                    value: "TURNO-APT-20260610-001"
                  - system: "https://portal.vitalflow.com.ar/identifier/appointment-external"
                    value: "PORTAL-APT-2026-001234"
                status: booked
                participant:
                  - actor:
                      reference: "Patient/paciente-001"
                      display: "Juan Doe"
                    status: accepted
                slot:
                  - reference: "Slot/slot-001"
                created: "2026-06-10T14:30:15-03:00"
                start: "2026-06-10T08:00:00-03:00"
                end: "2026-06-10T08:30:00-03:00"
                meta:
                  versionId: "1"
                  lastUpdated: "2026-06-10T17:30:15Z"
        "200":
          description: Appointment ya existía (idempotente) - retorna existente
          content:
            application/fhir+json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Slot o Patient no encontrado
          content:
            application/fhir+json:
              schema:
                $ref: "#/components/schemas/OperationOutcome"
        "409":
          description: Slot ya ocupado (conflicto de concurrencia)
          content:
            application/fhir+json:
              schema:
                $ref: "#/components/schemas/OperationOutcome"
              example:
                resourceType: OperationOutcome
                issue:
                  - severity: error
                    code: conflict
                    diagnostics: "Slot no longer available"
                    details:
                      text: "The selected slot (id: slot-001) has been reserved or blocked by another request"
        "422":
          description: Validación de negocio fallida
          content:
            application/fhir+json:
              schema:
                $ref: "#/components/schemas/OperationOutcome"
              example:
                resourceType: OperationOutcome
                issue:
                  - severity: error
                    code: invalid
                    expression: "Appointment.reason"
                    diagnostics: "Business rule validation failed"
                    details:
                      text: "Patient already has an active appointment for the same date"

  /fhir/R4/Appointment/{id}:
    get:
      summary: Get Appointment by ID
      description: Obtiene los detalles de un turno existente
      operationId: getAppointment
      tags:
        - Appointment
      parameters:
        - name: id
          in: path
          description: ID del Appointment
          required: true
          schema:
            type: string
            example: "apt-his-99887"
        - name: Correlation-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth:
            - fhir.appointment.read
      responses:
        "200":
          description: Appointment encontrado
          content:
            application/fhir+json:
              schema:
                $ref: "#/components/schemas/Appointment"
              example:
                resourceType: Appointment
                id: apt-his-99887
                identifier:
                  - system: "https://his.vitalflow.com.ar/identifier/appointment"
                    value: "TURNO-APT-20260610-001"
                status: booked
                participant:
                  - actor:
                      reference: "Patient/paciente-001"
                    status: accepted
                slot:
                  - reference: "Slot/slot-001"
                start: "2026-06-10T08:00:00-03:00"
                end: "2026-06-10T08:30:00-03:00"
                meta:
                  versionId: "1"
                  lastUpdated: "2026-06-10T17:30:15Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Appointment no encontrado
          content:
            application/fhir+json:
              schema:
                $ref: "#/components/schemas/OperationOutcome"

  /fhir/R4/Location:
    get:
      summary: Search Locations (Centros y Lugares)
      description: |
        Busca centros (sedes) y lugares de atención (consultorios, labs, etc.).
        Retorna solo locaciones activas.
      operationId: searchLocations
      tags:
        - Location
      parameters:
        - name: type
          in: query
          description: |
            Tipo de Location: sede (center), consultorio (consultation), lab, etc.
          schema:
            type: string
            enum:
              - sede
              - consultorio
              - lab
              - sala-espera
            example: sede
        - name: name
          in: query
          description: Búsqueda por nombre parcial (case-insensitive)
          schema:
            type: string
            example: "Centro Ambulatorio"
        - name: status
          in: query
          description: Estado de la locación
          schema:
            type: string
            enum:
              - active
              - inactive
            default: active
        - name: _count
          in: query
          description: Elementos por página (default 20, max 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: Correlation-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth:
            - fhir.location.read
      responses:
        "200":
          description: Bundle de Locations encontradas
          content:
            application/fhir+json:
              schema:
                $ref: "#/components/schemas/BundleLocation"
              example:
                resourceType: Bundle
                type: searchset
                total: 3
                entry:
                  - fullUrl: /fhir/R4/Location/centro-central
                    resource:
                      resourceType: Location
                      id: centro-central
                      identifier:
                        - system: "https://his.vitalflow.com.ar/identifier/centro"
                          value: "00000000-0000-0000-0000-000000000001"
                      status: active
                      name: "Centro Ambulatorio Central"
                      type:
                        - coding:
                            - system: "http://terminology.hl7.org/CodeSystem/v3-RoleCode"
                              code: CSC
                              display: "Community Health Center"
                      address:
                        line:
                          - "Av. Rivadavia 1234"
                        city: "Buenos Aires"
                        postalCode: "1002"
                        country: "AR"
                      telecom:
                        - system: phone
                          value: "+54-11-4543-1234"
                          use: work
                        - system: email
                          value: "info@centro-central.com.ar"
                          use: work
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  schemas:
    Bundle:
      type: object
      required:
        - resourceType
        - type
      properties:
        resourceType:
          type: string
          enum:
            - Bundle
        type:
          type: string
          enum:
            - searchset
        total:
          type: integer
          minimum: 0
        link:
          type: array
          items:
            $ref: "#/components/schemas/BundleLink"
        entry:
          type: array
          items:
            $ref: "#/components/schemas/BundleEntry"

    BundleLink:
      type: object
      properties:
        relation:
          type: string
        url:
          type: string

    BundleEntry:
      type: object
      properties:
        fullUrl:
          type: string
        resource:
          type: object

    BundleSchedule:
      allOf:
        - $ref: "#/components/schemas/Bundle"
        - type: object
          properties:
            entry:
              type: array
              items:
                properties:
                  resource:
                    $ref: "#/components/schemas/Schedule"

    BundleSlot:
      allOf:
        - $ref: "#/components/schemas/Bundle"
        - type: object
          properties:
            entry:
              type: array
              items:
                properties:
                  resource:
                    $ref: "#/components/schemas/Slot"

    BundleLocation:
      allOf:
        - $ref: "#/components/schemas/Bundle"
        - type: object
          properties:
            entry:
              type: array
              items:
                properties:
                  resource:
                    $ref: "#/components/schemas/Location"

    Schedule:
      type: object
      required:
        - resourceType
        - id
        - active
        - actor
      properties:
        resourceType:
          type: string
          enum:
            - Schedule
        id:
          type: string
          description: UUID o identificador único de la agenda
        identifier:
          type: array
          items:
            $ref: "#/components/schemas/Identifier"
        active:
          type: boolean
          description: Indica si la agenda está activa
        serviceType:
          type: array
          items:
            $ref: "#/components/schemas/CodeableConcept"
          description: Tipo de servicio (especialidad)
        actor:
          type: array
          items:
            $ref: "#/components/schemas/Reference"
          description: Profesional y Centro responsables
        planningHorizon:
          $ref: "#/components/schemas/Period"
        comment:
          type: string
        extension:
          type: array
          items:
            $ref: "#/components/schemas/Extension"
        created:
          type: string
          format: date-time

    Slot:
      type: object
      required:
        - resourceType
        - id
        - schedule
        - status
        - start
        - end
      properties:
        resourceType:
          type: string
          enum:
            - Slot
        id:
          type: string
        identifier:
          type: array
          items:
            $ref: "#/components/schemas/Identifier"
        schedule:
          $ref: "#/components/schemas/Reference"
        status:
          type: string
          enum:
            - free
            - busy
            - busy-unavailable
            - entered-in-error
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        overbooked:
          type: boolean
        extension:
          type: array
          items:
            $ref: "#/components/schemas/Extension"

    Appointment:
      type: object
      required:
        - resourceType
        - status
        - participant
        - start
        - end
      properties:
        resourceType:
          type: string
          enum:
            - Appointment
        id:
          type: string
          description: ID generado por el HIS en la creación
        identifier:
          type: array
          items:
            $ref: "#/components/schemas/Identifier"
        status:
          type: string
          enum:
            - proposed
            - pending
            - booked
            - arrived
            - fulfilled
            - cancelled
            - noshow
            - entered-in-error
            - checked-in
            - waitlist
          description: Estado del turno
        participant:
          type: array
          minItems: 3
          items:
            $ref: "#/components/schemas/AppointmentParticipant"
          description: "Paciente, Profesional, Locación"
        slot:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/Reference"
        created:
          type: string
          format: date-time
        start:
          type: string
          format: date-time
          description: Inicio del turno
        end:
          type: string
          format: date-time
          description: Fin del turno
        reason:
          type: array
          items:
            $ref: "#/components/schemas/CodeableReference"
        extension:
          type: array
          items:
            $ref: "#/components/schemas/Extension"
        meta:
          $ref: "#/components/schemas/Meta"

    Location:
      type: object
      required:
        - resourceType
        - id
        - name
        - status
      properties:
        resourceType:
          type: string
          enum:
            - Location
        id:
          type: string
        identifier:
          type: array
          items:
            $ref: "#/components/schemas/Identifier"
        status:
          type: string
          enum:
            - active
            - inactive
            - suspended
        name:
          type: string
          description: Nombre del centro o lugar
        type:
          type: array
          items:
            $ref: "#/components/schemas/CodeableConcept"
        telecom:
          type: array
          items:
            $ref: "#/components/schemas/ContactPoint"
        address:
          $ref: "#/components/schemas/Address"
        partOf:
          $ref: "#/components/schemas/Reference"
          description: Referencia a Location padre (ej. consultorio dentro de centro)
        managingOrganization:
          $ref: "#/components/schemas/Reference"

    OperationOutcome:
      type: object
      required:
        - resourceType
        - issue
      properties:
        resourceType:
          type: string
          enum:
            - OperationOutcome
        issue:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/OperationOutcomeIssue"

    OperationOutcomeIssue:
      type: object
      required:
        - severity
        - code
      properties:
        severity:
          type: string
          enum:
            - fatal
            - error
            - warning
            - information
        code:
          type: string
          enum:
            - invalid
            - structure
            - required
            - value
            - invariant
            - security
            - login
            - unknown
            - expired
            - forbidden
            - suppressed
            - processing
            - not-supported
            - duplicate
            - multiple-matches
            - not-found
            - deleted
            - too-long
            - code-invalid
            - extension
            - too-costly
            - business-rule
            - conflict
            - transient
            - lock-error
            - no-store
            - exception
            - timeout
            - incomplete
            - throttled
            - informational
        details:
          $ref: "#/components/schemas/CodeableConcept"
        diagnostics:
          type: string
          description: Descripción adicional del error
        expression:
          type: array
          items:
            type: string
          description: Expresión FHIRPath indicando campo afectado

    Identifier:
      type: object
      properties:
        system:
          type: string
          format: uri
        value:
          type: string

    Reference:
      type: object
      properties:
        reference:
          type: string
          description: "Referencia relativa (Resource/id)"
        display:
          type: string
          description: Nombre legible

    CodeableConcept:
      type: object
      properties:
        coding:
          type: array
          items:
            $ref: "#/components/schemas/Coding"
        text:
          type: string

    Coding:
      type: object
      properties:
        system:
          type: string
          format: uri
        code:
          type: string
        display:
          type: string

    CodeableReference:
      type: object
      properties:
        concept:
          $ref: "#/components/schemas/CodeableConcept"
        reference:
          $ref: "#/components/schemas/Reference"
        text:
          type: string

    Period:
      type: object
      properties:
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time

    Extension:
      type: object
      properties:
        url:
          type: string
          format: uri
        valueString:
          type: string
        valueInteger:
          type: integer
        valueBoolean:
          type: boolean
        valueReference:
          $ref: "#/components/schemas/Reference"

    AppointmentParticipant:
      type: object
      required:
        - actor
        - status
      properties:
        actor:
          $ref: "#/components/schemas/Reference"
        required:
          type: string
          enum:
            - required
            - recommended
            - information
          default: required
        status:
          type: string
          enum:
            - accepted
            - declined
            - tentative
            - needs-action

    Meta:
      type: object
      properties:
        versionId:
          type: string
        lastUpdated:
          type: string
          format: date-time

    Address:
      type: object
      properties:
        line:
          type: array
          items:
            type: string
        city:
          type: string
        postalCode:
          type: string
        country:
          type: string

    ContactPoint:
      type: object
      properties:
        system:
          type: string
          enum:
            - phone
            - fax
            - email
            - pager
            - url
            - sms
            - other
        value:
          type: string
        use:
          type: string
          enum:
            - home
            - work
            - temp
            - old
            - mobile

  responses:
    Unauthorized:
      description: Token inválido, expirado o ausente
      content:
        application/fhir+json:
          schema:
            $ref: "#/components/schemas/OperationOutcome"
          example:
            resourceType: OperationOutcome
            issue:
              - severity: error
                code: forbidden
                diagnostics: "JWT token is expired or invalid"

    Forbidden:
      description: Scope insuficiente para esta operación
      content:
        application/fhir+json:
          schema:
            $ref: "#/components/schemas/OperationOutcome"
          example:
            resourceType: OperationOutcome
            issue:
              - severity: error
                code: forbidden
                diagnostics: "Insufficient permissions for this operation"

    InternalServerError:
      description: Error interno del servidor
      content:
        application/fhir+json:
          schema:
            $ref: "#/components/schemas/OperationOutcome"
          example:
            resourceType: OperationOutcome
            issue:
              - severity: error
                code: exception
                diagnostics: "Internal Server Error"

  securitySchemes:
    bearerAuth:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://his.vitalflow.com.ar/oauth/token
          scopes:
            fhir.schedule.read: Lectura de agendas (Schedule)
            fhir.slot.read: Lectura de slots disponibles
            fhir.appointment.write: Crear nuevos turnos (Appointment)
            fhir.appointment.read: Lectura de turnos existentes
            fhir.location.read: Lectura de centros/lugares

